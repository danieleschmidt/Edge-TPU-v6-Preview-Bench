---
# Horizontal Pod Autoscaler for Production
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edge-tpu-benchmark-hpa
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
    environment: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edge-tpu-v6-benchmark-production
  minReplicas: 3
  maxReplicas: 20
  metrics:
  # CPU utilization target
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Memory utilization target
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  # Custom metrics from Prometheus
  - type: Pods
    pods:
      metric:
        name: edge_tpu_inference_latency_ms
      target:
        type: AverageValue
        averageValue: "5"
  - type: Pods
    pods:
      metric:
        name: edge_tpu_queue_depth
      target:
        type: AverageValue
        averageValue: "10"
  - type: Pods
    pods:
      metric:
        name: edge_tpu_concurrent_requests
      target:
        type: AverageValue
        averageValue: "50"
  # Scale-down behavior
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 4
        periodSeconds: 60
      selectPolicy: Max

---
# Horizontal Pod Autoscaler for Staging
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edge-tpu-benchmark-staging-hpa
  namespace: edge-tpu-staging
  labels:
    app: edge-tpu-benchmark
    environment: staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edge-tpu-v6-benchmark-staging
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
      - type: Percent
        value: 20
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60

---
# Vertical Pod Autoscaler for Production
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: edge-tpu-benchmark-vpa
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
    environment: production
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edge-tpu-v6-benchmark-production
  updatePolicy:
    updateMode: "Auto"
    minReplicas: 3
  resourcePolicy:
    containerPolicies:
    - containerName: edge-tpu-benchmark
      minAllowed:
        cpu: 100m
        memory: 512Mi
      maxAllowed:
        cpu: 4000m
        memory: 8Gi
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsAndLimits

---
# Vertical Pod Autoscaler for Staging
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: edge-tpu-benchmark-staging-vpa
  namespace: edge-tpu-staging
  labels:
    app: edge-tpu-benchmark
    environment: staging
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edge-tpu-v6-benchmark-staging
  updatePolicy:
    updateMode: "Off"  # Recommendation mode only for staging
  resourcePolicy:
    containerPolicies:
    - containerName: edge-tpu-benchmark
      minAllowed:
        cpu: 50m
        memory: 256Mi
      maxAllowed:
        cpu: 2000m
        memory: 4Gi
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsAndLimits

---
# Cluster Autoscaler Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-autoscaler-status
  namespace: kube-system
  labels:
    app: cluster-autoscaler
data:
  nodes.max: "50"
  nodes.min: "3"
  scale-down-enabled: "true"
  scale-down-delay-after-add: "10m"
  scale-down-unneeded-time: "10m"
  skip-nodes-with-local-storage: "false"
  skip-nodes-with-system-pods: "false"

---
# Pod Disruption Budget for Production
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: edge-tpu-benchmark-production-pdb
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
    environment: production
spec:
  minAvailable: 50%
  selector:
    matchLabels:
      app: edge-tpu-benchmark
      environment: production

---
# Pod Disruption Budget for Staging
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: edge-tpu-benchmark-staging-pdb
  namespace: edge-tpu-staging
  labels:
    app: edge-tpu-benchmark
    environment: staging
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: edge-tpu-benchmark
      environment: staging

---
# Custom Resource Definition for Edge TPU Scaling
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: edgetpuscalers.autoscaling.terragonlabs.ai
spec:
  group: autoscaling.terragonlabs.ai
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              targetRef:
                type: object
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
              minReplicas:
                type: integer
                minimum: 1
              maxReplicas:
                type: integer
              metrics:
                type: object
                properties:
                  latencyThresholdMs:
                    type: integer
                    minimum: 1
                  throughputThresholdRPS:
                    type: integer
                    minimum: 1
                  accuracyThresholdPercent:
                    type: number
                    minimum: 0
                    maximum: 100
                  powerEfficiencyThreshold:
                    type: number
                    minimum: 0
          status:
            type: object
            properties:
              currentReplicas:
                type: integer
              desiredReplicas:
                type: integer
              lastScaleTime:
                type: string
                format: date-time
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
  scope: Namespaced
  names:
    plural: edgetpuscalers
    singular: edgetpuscaler
    kind: EdgeTPUScaler

---
# Example Edge TPU Custom Scaler
apiVersion: autoscaling.terragonlabs.ai/v1
kind: EdgeTPUScaler
metadata:
  name: edge-tpu-benchmark-custom-scaler
  namespace: edge-tpu-production
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edge-tpu-v6-benchmark-production
  minReplicas: 3
  maxReplicas: 20
  metrics:
    latencyThresholdMs: 5
    throughputThresholdRPS: 200
    accuracyThresholdPercent: 95.0
    powerEfficiencyThreshold: 0.8

---
# KEDA ScaledObject for advanced autoscaling
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: edge-tpu-benchmark-scaled-object
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
    environment: production
spec:
  scaleTargetRef:
    name: edge-tpu-v6-benchmark-production
  pollingInterval: 15
  cooldownPeriod: 300
  idleReplicaCount: 3
  minReplicaCount: 3
  maxReplicaCount: 20
  triggers:
  # Prometheus metrics trigger
  - type: prometheus
    metadata:
      serverAddress: http://prometheus.edge-tpu-monitoring.svc.cluster.local:9090
      metricName: edge_tpu_inference_latency_p95
      threshold: '5'
      query: histogram_quantile(0.95, rate(edge_tpu_inference_duration_seconds_bucket[5m])) * 1000
  # Queue depth trigger
  - type: prometheus
    metadata:
      serverAddress: http://prometheus.edge-tpu-monitoring.svc.cluster.local:9090
      metricName: edge_tpu_queue_depth
      threshold: '10'
      query: avg(edge_tpu_queue_depth)
  # Memory pressure trigger
  - type: prometheus
    metadata:
      serverAddress: http://prometheus.edge-tpu-monitoring.svc.cluster.local:9090
      metricName: edge_tpu_memory_pressure
      threshold: '0.8'
      query: avg(container_memory_usage_bytes{pod=~"edge-tpu-v6-benchmark-production.*"}) / avg(container_spec_memory_limit_bytes{pod=~"edge-tpu-v6-benchmark-production.*"})

---
# Multi-Dimensional Pod Autoscaler (Experimental)
apiVersion: v1
kind: ConfigMap
metadata:
  name: multidimensional-autoscaler-config
  namespace: edge-tpu-production
data:
  config.yaml: |
    autoscaling:
      dimensions:
        - name: latency
          metric: edge_tpu_inference_latency_p95
          target: 5.0
          weight: 0.4
          unit: milliseconds
        - name: throughput
          metric: edge_tpu_requests_per_second
          target: 200.0
          weight: 0.3
          unit: rps
        - name: accuracy
          metric: edge_tpu_model_accuracy
          target: 0.95
          weight: 0.2
          unit: percent
        - name: power_efficiency
          metric: edge_tpu_power_efficiency_ratio
          target: 0.8
          weight: 0.1
          unit: ratio
      scaling:
        algorithm: weighted_average
        hysteresis: 0.1
        scale_up_threshold: 1.2
        scale_down_threshold: 0.8
        min_replicas: 3
        max_replicas: 20
        scale_up_limit: 5
        scale_down_limit: 2
        stabilization_window: 180
      regions:
        primary: us-east-1
        secondary: 
          - us-west-2
          - eu-west-1
        failover_strategy: round_robin