---
# Service Account for Edge TPU Production
apiVersion: v1
kind: ServiceAccount
metadata:
  name: edge-tpu-prod-service-account
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
    environment: production
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/EdgeTPUProductionRole
automountServiceAccountToken: true

---
# Service Account for Edge TPU Staging
apiVersion: v1
kind: ServiceAccount
metadata:
  name: edge-tpu-staging-service-account
  namespace: edge-tpu-staging
  labels:
    app: edge-tpu-benchmark
    environment: staging
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/EdgeTPUStagingRole
automountServiceAccountToken: true

---
# Service Account for Monitoring
apiVersion: v1
kind: ServiceAccount
metadata:
  name: edge-tpu-monitoring-service-account
  namespace: edge-tpu-monitoring
  labels:
    app: edge-tpu-monitoring
    environment: monitoring
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/EdgeTPUMonitoringRole
automountServiceAccountToken: true

---
# ClusterRole for Edge TPU Application
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edge-tpu-app-role
rules:
# Basic resource access for application functionality
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list", "watch"]
# Metrics and monitoring
- apiGroups: [""]
  resources: ["nodes", "nodes/metrics", "nodes/stats"]
  verbs: ["get", "list"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]

---
# Role for application-specific operations within namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: edge-tpu-production
  name: edge-tpu-prod-role
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/status"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch", "create"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# Role for staging environment
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: edge-tpu-staging
  name: edge-tpu-staging-role
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/status"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch", "create"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# Monitoring Role
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edge-tpu-monitoring-role
rules:
# Prometheus monitoring permissions
- apiGroups: [""]
  resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list"]

---
# RoleBinding for Production
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edge-tpu-prod-rolebinding
  namespace: edge-tpu-production
subjects:
- kind: ServiceAccount
  name: edge-tpu-prod-service-account
  namespace: edge-tpu-production
roleRef:
  kind: Role
  name: edge-tpu-prod-role
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRoleBinding for Production Application
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edge-tpu-prod-cluster-rolebinding
subjects:
- kind: ServiceAccount
  name: edge-tpu-prod-service-account
  namespace: edge-tpu-production
roleRef:
  kind: ClusterRole
  name: edge-tpu-app-role
  apiGroup: rbac.authorization.k8s.io

---
# RoleBinding for Staging
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edge-tpu-staging-rolebinding
  namespace: edge-tpu-staging
subjects:
- kind: ServiceAccount
  name: edge-tpu-staging-service-account
  namespace: edge-tpu-staging
roleRef:
  kind: Role
  name: edge-tpu-staging-role
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRoleBinding for Staging Application
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edge-tpu-staging-cluster-rolebinding
subjects:
- kind: ServiceAccount
  name: edge-tpu-staging-service-account
  namespace: edge-tpu-staging
roleRef:
  kind: ClusterRole
  name: edge-tpu-app-role
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRoleBinding for Monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edge-tpu-monitoring-cluster-rolebinding
subjects:
- kind: ServiceAccount
  name: edge-tpu-monitoring-service-account
  namespace: edge-tpu-monitoring
roleRef:
  kind: ClusterRole
  name: edge-tpu-monitoring-role
  apiGroup: rbac.authorization.k8s.io

---
# Pod Security Policy (deprecated but shown for completeness)
# Use Pod Security Standards instead in modern clusters
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: edge-tpu-psp
  annotations:
    seccomp.security.alpha.kubernetes.io/allowedProfileNames: 'runtime/default'
    apparmor.security.beta.kubernetes.io/allowedProfileNames: 'runtime/default'
    seccomp.security.alpha.kubernetes.io/defaultProfileName: 'runtime/default'
    apparmor.security.beta.kubernetes.io/defaultProfileName: 'runtime/default'
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'
  readOnlyRootFilesystem: true

---
# Network Policy for Production Namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: edge-tpu-production-netpol
  namespace: edge-tpu-production
spec:
  podSelector:
    matchLabels:
      app: edge-tpu-benchmark
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: edge-tpu-monitoring
  # Allow ingress from same namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: edge-tpu-production
  # Allow ingress from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow HTTPS outbound for API calls
  - to: []
    ports:
    - protocol: TCP
      port: 443
  # Allow communication within namespace
  - to:
    - namespaceSelector:
        matchLabels:
          name: edge-tpu-production