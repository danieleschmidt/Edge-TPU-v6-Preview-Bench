---
# Velero Backup and Restore Configuration
apiVersion: v1
kind: Namespace
metadata:
  name: velero
  labels:
    component: backup-restore
    team: sre

---
# Velero Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velero
  namespace: velero
  labels:
    app: velero
    component: backup-restore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: velero
  template:
    metadata:
      labels:
        app: velero
    spec:
      serviceAccountName: velero
      restartPolicy: Always
      containers:
      - name: velero
        image: velero/velero:v1.11.1
        command:
        - /velero
        args:
        - server
        - --log-level=info
        - --log-format=json
        - --features=EnableCSI
        - --default-volumes-to-restic=false
        - --default-volume-snapshot-locations=default:aws-ebs
        - --backup-sync-period=60m
        - --fs-backup-timeout=240m
        - --default-backup-ttl=720h
        env:
        - name: VELERO_SCRATCH_DIR
          value: /scratch
        - name: VELERO_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: LD_LIBRARY_PATH
          value: /plugins
        - name: AWS_SHARED_CREDENTIALS_FILE
          value: /credentials/cloud
        resources:
          requests:
            cpu: 500m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        volumeMounts:
        - name: plugins
          mountPath: /plugins
        - name: scratch
          mountPath: /scratch
        - name: cloud-credentials
          mountPath: /credentials
          readOnly: true
        livenessProbe:
          httpGet:
            path: /metrics
            port: 8085
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /metrics
            port: 8085
          initialDelaySeconds: 10
          periodSeconds: 5
      initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.7.1
        volumeMounts:
        - mountPath: /target
          name: plugins
      - name: velero-plugin-for-csi
        image: velero/velero-plugin-for-csi:v0.5.1
        volumeMounts:
        - mountPath: /target
          name: plugins
      volumes:
      - name: plugins
        emptyDir: {}
      - name: scratch
        emptyDir: {}
      - name: cloud-credentials
        secret:
          secretName: cloud-credentials

---
# Velero Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero
  namespace: velero
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/VeleroBackupRole

---
# Velero RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velero
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
- nonResourceURLs: ["*"]
  verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero
subjects:
- kind: ServiceAccount
  name: velero
  namespace: velero
roleRef:
  kind: ClusterRole
  name: velero
  apiGroup: rbac.authorization.k8s.io

---
# Cloud Credentials Secret
apiVersion: v1
kind: Secret
metadata:
  name: cloud-credentials
  namespace: velero
type: Opaque
data:
  cloud: |
    W2RlZmF1bHRdCmF3c19hY2Nlc3Nfa2V5X2lkID0gWU9VUl9BV1NfQUNDRVNTX0tFWV9JRAphdz
    Nfc2VjcmV0X2FjY2Vzc19rZXkgPSBZT1VSX0FXU19TRUNSRVRfQUNDRVNTX0tFWQo=

---
# Backup Storage Location
apiVersion: velero.io/v1
kind: BackupStorageLocation
metadata:
  name: aws-s3
  namespace: velero
  labels:
    component: backup-storage
spec:
  provider: aws
  objectStorage:
    bucket: edge-tpu-backups-terragonlabs
    prefix: kubernetes-backups
  config:
    region: us-east-1
    s3ForcePathStyle: "false"
    s3Url: https://s3.us-east-1.amazonaws.com
    publicUrl: https://s3.us-east-1.amazonaws.com
    checksumAlgorithm: CRC32
  credential:
    name: cloud-credentials
    key: cloud
  default: true

---
# Volume Snapshot Location
apiVersion: velero.io/v1
kind: VolumeSnapshotLocation
metadata:
  name: aws-ebs
  namespace: velero
  labels:
    component: volume-snapshots
spec:
  provider: aws
  config:
    region: us-east-1
    profile: default

---
# Daily Backup Schedule for Production
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: edge-tpu-production-daily
  namespace: velero
  labels:
    environment: production
    backup-type: daily
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM UTC
  template:
    metadata:
      labels:
        environment: production
        backup-type: daily
    spec:
      includedNamespaces:
      - edge-tpu-production
      - edge-tpu-monitoring
      excludedResources:
      - events
      - events.events.k8s.io
      snapshotVolumes: true
      ttl: 168h  # 7 days retention
      storageLocation: aws-s3
      volumeSnapshotLocations:
      - aws-ebs
      defaultVolumesToRestic: false
      hooks:
        pre:
        - resource:
            name: edge-tpu-v6-benchmark-production
            kind: Deployment
          exec:
            command: ["/bin/sh", "-c"]
            args: ["echo 'Pre-backup hook: Scaling down for consistent backup'"]
        post:
        - resource:
            name: edge-tpu-v6-benchmark-production
            kind: Deployment  
          exec:
            command: ["/bin/sh", "-c"]
            args: ["echo 'Post-backup hook: Backup completed successfully'"]

---
# Weekly Backup Schedule for Long-term Retention
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: edge-tpu-production-weekly
  namespace: velero
  labels:
    environment: production
    backup-type: weekly
spec:
  schedule: "0 3 * * 0"  # Weekly on Sunday at 3 AM UTC
  template:
    metadata:
      labels:
        environment: production
        backup-type: weekly
    spec:
      includedNamespaces:
      - edge-tpu-production
      - edge-tpu-staging
      - edge-tpu-monitoring
      - velero
      snapshotVolumes: true
      ttl: 2160h  # 90 days retention
      storageLocation: aws-s3
      volumeSnapshotLocations:
      - aws-ebs

---
# Staging Environment Backup Schedule
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: edge-tpu-staging-backup
  namespace: velero
  labels:
    environment: staging
    backup-type: daily
spec:
  schedule: "0 4 * * *"  # Daily at 4 AM UTC
  template:
    metadata:
      labels:
        environment: staging
        backup-type: daily
    spec:
      includedNamespaces:
      - edge-tpu-staging
      snapshotVolumes: true
      ttl: 72h  # 3 days retention
      storageLocation: aws-s3
      volumeSnapshotLocations:
      - aws-ebs

---
# Critical Data Backup (High Frequency)
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: edge-tpu-critical-data-backup
  namespace: velero
  labels:
    backup-type: critical
    frequency: high
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  template:
    metadata:
      labels:
        backup-type: critical
        frequency: high
    spec:
      includedNamespaces:
      - edge-tpu-production
      includedResources:
      - persistentvolumes
      - persistentvolumeclaims
      - configmaps
      - secrets
      labelSelector:
        matchLabels:
          backup-priority: critical
      snapshotVolumes: true
      ttl: 72h  # 3 days retention
      storageLocation: aws-s3

---
# Disaster Recovery Backup (Cross-Region)
apiVersion: velero.io/v1
kind: BackupStorageLocation
metadata:
  name: aws-s3-dr
  namespace: velero
  labels:
    component: disaster-recovery
spec:
  provider: aws
  objectStorage:
    bucket: edge-tpu-dr-backups-terragonlabs
    prefix: disaster-recovery
  config:
    region: us-west-2  # Different region for DR
    s3ForcePathStyle: "false"
    s3Url: https://s3.us-west-2.amazonaws.com
  credential:
    name: cloud-credentials
    key: cloud

---
# Disaster Recovery Schedule
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: edge-tpu-disaster-recovery
  namespace: velero
  labels:
    backup-type: disaster-recovery
    region: cross-region
spec:
  schedule: "0 1 * * *"  # Daily at 1 AM UTC
  template:
    metadata:
      labels:
        backup-type: disaster-recovery
        region: cross-region
    spec:
      includedNamespaces:
      - edge-tpu-production
      - edge-tpu-monitoring
      snapshotVolumes: true
      ttl: 2160h  # 90 days retention
      storageLocation: aws-s3-dr
      volumeSnapshotLocations:
      - aws-ebs

---
# Database Backup CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: edge-tpu-monitoring
  labels:
    component: database-backup
spec:
  schedule: "30 2 * * *"  # Daily at 2:30 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          serviceAccountName: backup-service-account
          restartPolicy: OnFailure
          containers:
          - name: postgres-backup
            image: postgres:13
            command:
            - /bin/bash
            - -c
            - |
              set -e
              BACKUP_FILE="postgres_backup_$(date +%Y%m%d_%H%M%S).sql"
              pg_dump -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB > /backups/$BACKUP_FILE
              aws s3 cp /backups/$BACKUP_FILE s3://edge-tpu-backups-terragonlabs/database-backups/
              echo "Database backup completed: $BACKUP_FILE"
              # Cleanup old local backups
              find /backups -name "postgres_backup_*.sql" -mtime +7 -delete
            env:
            - name: POSTGRES_HOST
              value: postgres.edge-tpu-monitoring.svc.cluster.local
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: database
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-backup-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-backup-credentials
                  key: secret-access-key
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: backup-storage-pvc

---
# Backup Storage PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-storage-pvc
  namespace: edge-tpu-monitoring
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: fast-ssd

---
# Restore Job Template
apiVersion: batch/v1
kind: Job
metadata:
  name: edge-tpu-restore-template
  namespace: velero
  labels:
    component: restore-template
  annotations:
    restore.velero.io/backup-name: ""  # Set this when creating restore job
spec:
  template:
    metadata:
      labels:
        app: velero-restore
    spec:
      serviceAccountName: velero
      restartPolicy: OnFailure
      containers:
      - name: velero-restore
        image: velero/velero:v1.11.1
        command:
        - /bin/sh
        - -c
        - |
          # Automated restore script
          echo "Starting restore process..."
          BACKUP_NAME=${BACKUP_NAME:-"latest"}
          
          if [ "$BACKUP_NAME" = "latest" ]; then
            BACKUP_NAME=$(velero backup get --output json | jq -r '.items | sort_by(.metadata.creationTimestamp) | last | .metadata.name')
          fi
          
          echo "Restoring from backup: $BACKUP_NAME"
          velero restore create restore-$(date +%Y%m%d-%H%M%S) \
            --from-backup $BACKUP_NAME \
            --include-namespaces edge-tpu-production,edge-tpu-monitoring \
            --wait
          
          echo "Restore completed successfully"
        env:
        - name: BACKUP_NAME
          value: ""  # Can be overridden
        - name: VELERO_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

---
# Backup Verification Job
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-verification
  namespace: velero
  labels:
    component: backup-verification
spec:
  schedule: "0 6 * * *"  # Daily at 6 AM UTC
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: backup-verification
        spec:
          serviceAccountName: velero
          restartPolicy: OnFailure
          containers:
          - name: backup-verifier
            image: velero/velero:v1.11.1
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting backup verification..."
              
              # Check if recent backups exist
              RECENT_BACKUPS=$(velero backup get --output json | jq -r '.items[] | select(.status.phase == "Completed") | select((.metadata.creationTimestamp | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime) > (now - 86400)) | .metadata.name')
              
              if [ -z "$RECENT_BACKUPS" ]; then
                echo "ERROR: No recent successful backups found!"
                exit 1
              fi
              
              echo "Recent successful backups:"
              echo "$RECENT_BACKUPS"
              
              # Verify backup contents
              for backup in $RECENT_BACKUPS; do
                echo "Verifying backup: $backup"
                velero backup describe $backup --details
                
                # Check if critical resources are backed up
                RESOURCE_COUNT=$(velero backup describe $backup --details | grep -c "persistentvolumeclaims\|configmaps\|secrets\|deployments")
                if [ $RESOURCE_COUNT -lt 4 ]; then
                  echo "WARNING: Backup $backup may be incomplete"
                fi
              done
              
              echo "Backup verification completed successfully"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi

---
# Backup Monitoring and Alerts
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: velero-metrics
  namespace: velero
  labels:
    team: edge-tpu
    component: backup-monitoring
spec:
  selector:
    matchLabels:
      app: velero
  endpoints:
  - port: monitoring
    interval: 30s
    path: /metrics

---
# Backup Alert Rules
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: velero-backup-alerts
  namespace: velero
  labels:
    team: edge-tpu
    component: backup-alerts
spec:
  groups:
  - name: velero.backup.rules
    rules:
    - alert: VeleroBackupFailed
      expr: velero_backup_failure_total > 0
      for: 5m
      labels:
        severity: critical
        team: sre
        component: backup
      annotations:
        summary: "Velero backup has failed"
        description: "Velero backup {{ $labels.backup }} has failed for schedule {{ $labels.schedule }}"
        
    - alert: VeleroBackupMissing
      expr: time() - velero_backup_last_successful_timestamp > 86400
      for: 30m
      labels:
        severity: critical
        team: sre
        component: backup
      annotations:
        summary: "Velero backup is overdue"
        description: "No successful Velero backup in the last 24 hours for schedule {{ $labels.schedule }}"
        
    - alert: VeleroBackupPartialFailure
      expr: velero_backup_partial_failure_total > 0
      for: 10m
      labels:
        severity: warning
        team: sre
        component: backup
      annotations:
        summary: "Velero backup partially failed"
        description: "Velero backup {{ $labels.backup }} partially failed with {{ $value }} failures"

---
# Disaster Recovery Runbook ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: disaster-recovery-runbook
  namespace: velero
  labels:
    component: disaster-recovery
    documentation: runbook
data:
  disaster-recovery.md: |
    # Edge TPU v6 Disaster Recovery Runbook
    
    ## Overview
    This runbook provides step-by-step instructions for disaster recovery scenarios.
    
    ## Backup Verification
    ```bash
    # Check recent backups
    velero backup get
    
    # Verify backup details
    velero backup describe <backup-name> --details
    ```
    
    ## Full Cluster Restore
    ```bash
    # 1. Create new cluster
    # 2. Install Velero
    # 3. Configure backup storage location
    kubectl apply -f backup-storage-location.yaml
    
    # 4. Restore from latest backup
    velero restore create cluster-restore-$(date +%Y%m%d) \
      --from-backup <backup-name> \
      --restore-volumes=true
    
    # 5. Monitor restore progress
    velero restore get
    velero restore describe cluster-restore-$(date +%Y%m%d)
    ```
    
    ## Namespace-Specific Restore
    ```bash
    # Restore specific namespace
    velero restore create namespace-restore-$(date +%Y%m%d) \
      --from-backup <backup-name> \
      --include-namespaces edge-tpu-production
    ```
    
    ## Database Restore
    ```bash
    # 1. Download database backup from S3
    aws s3 cp s3://edge-tpu-backups-terragonlabs/database-backups/<backup-file> .
    
    # 2. Restore to PostgreSQL
    kubectl exec -n edge-tpu-monitoring postgres-0 -- psql -U postgres -d grafana < backup-file.sql
    ```
    
    ## Verification Steps
    1. Check all pods are running
    2. Verify application functionality
    3. Test monitoring and alerting
    4. Validate data integrity
    5. Update DNS and external dependencies
    
    ## Recovery Time Objectives (RTO)
    - Cluster restore: 4 hours
    - Namespace restore: 1 hour
    - Database restore: 30 minutes
    
    ## Recovery Point Objectives (RPO)
    - Production data: 6 hours
    - Configuration: 24 hours
    - Monitoring data: 24 hours