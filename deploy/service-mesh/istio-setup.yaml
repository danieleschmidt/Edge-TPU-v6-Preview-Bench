---
# Istio Control Plane Installation
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: edge-tpu-control-plane
  namespace: istio-system
  labels:
    component: service-mesh
    version: "1.18.2"
spec:
  values:
    global:
      meshID: edge-tpu-mesh
      network: primary-network
      hub: docker.io/istio
      tag: 1.18.2
      proxy:
        resources:
          requests:
            cpu: 10m
            memory: 40Mi
          limits:
            cpu: 100m
            memory: 128Mi
      pilot:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      istiod:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
    pilot:
      env:
        PILOT_ENABLE_WORKLOAD_ENTRY_AUTOREGISTRATION: true
        PILOT_ENABLE_CROSS_CLUSTER_WORKLOAD_ENTRY: true
        EXTERNAL_ISTIOD: true
    gateways:
      istio-ingressgateway:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 2000m
            memory: 1024Mi
  components:
    pilot:
      k8s:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        hpaSpec:
          minReplicas: 2
          maxReplicas: 5
          metrics:
          - type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 80
    ingressGateways:
    - name: istio-ingressgateway
      enabled: true
      k8s:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 2000m
            memory: 1024Mi
        hpaSpec:
          minReplicas: 2
          maxReplicas: 5
        service:
          type: LoadBalancer
          ports:
          - name: status-port
            port: 15021
            targetPort: 15021
          - name: http2
            port: 80
            targetPort: 8080
          - name: https
            port: 443
            targetPort: 8443
          - name: tcp
            port: 31400
            targetPort: 31400
        overlays:
        - kind: Deployment
          name: istio-ingressgateway
          patches:
          - path: spec.template.spec.containers[0].resources
            value:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 2000m
                memory: 1024Mi
    egressGateways:
    - name: istio-egressgateway
      enabled: true
      k8s:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi

---
# Istio Gateway for Edge TPU Services
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: edge-tpu-gateway
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "edge-tpu.terragonlabs.ai"
    - "edge-tpu-api.terragonlabs.ai"
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    hosts:
    - "edge-tpu.terragonlabs.ai"
    - "edge-tpu-api.terragonlabs.ai"
    tls:
      mode: SIMPLE
      credentialName: edge-tpu-tls-secret

---
# Virtual Service for Edge TPU Production
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: edge-tpu-production-vs
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
    environment: production
spec:
  hosts:
  - "edge-tpu.terragonlabs.ai"
  - "edge-tpu-api.terragonlabs.ai"
  gateways:
  - edge-tpu-gateway
  http:
  # Health check route
  - match:
    - uri:
        exact: /health
    - uri:
        exact: /ready
    route:
    - destination:
        host: edge-tpu-benchmark-active.edge-tpu-production.svc.cluster.local
        port:
          number: 80
    timeout: 10s
    retries:
      attempts: 3
      perTryTimeout: 3s
  # API routes with rate limiting
  - match:
    - uri:
        prefix: /api/
    route:
    - destination:
        host: edge-tpu-benchmark-active.edge-tpu-production.svc.cluster.local
        port:
          number: 80
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5s
  # Metrics route (restricted)
  - match:
    - uri:
        exact: /metrics
    route:
    - destination:
        host: edge-tpu-benchmark-active.edge-tpu-production.svc.cluster.local
        port:
          number: 9090
    headers:
      request:
        set:
          x-forwarded-for: "%DOWNSTREAM_REMOTE_ADDRESS%"
  # Default route
  - route:
    - destination:
        host: edge-tpu-benchmark-active.edge-tpu-production.svc.cluster.local
        port:
          number: 80
    timeout: 30s

---
# Destination Rule for Edge TPU Production
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: edge-tpu-production-dr
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
    environment: production
spec:
  host: edge-tpu-benchmark-active.edge-tpu-production.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 30s
        keepAlive:
          time: 7200s
          interval: 75s
      http:
        http1MaxPendingRequests: 10
        http2MaxRequests: 100
        maxRequestsPerConnection: 10
        maxRetries: 3
        consecutiveGatewayErrors: 5
        interval: 30s
        baseEjectionTime: 30s
        maxEjectionPercent: 50
    loadBalancer:
      simple: LEAST_CONN
      consistentHash:
        httpHeaderName: "x-user-id"
    outlierDetection:
      consecutiveGatewayErrors: 5
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 30

---
# Service Entry for External Dependencies
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-apis
  namespace: edge-tpu-production
spec:
  hosts:
  - api.terragonlabs.ai
  - monitoring.terragonlabs.ai
  ports:
  - number: 443
    name: https
    protocol: HTTPS
  location: MESH_EXTERNAL
  resolution: DNS

---
# AuthorizationPolicy for Edge TPU Services
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: edge-tpu-auth-policy
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
spec:
  selector:
    matchLabels:
      app: edge-tpu-benchmark
  rules:
  # Allow health checks from anywhere
  - to:
    - operation:
        paths: ["/health", "/ready"]
  # Allow API access with authentication
  - to:
    - operation:
        paths: ["/api/*"]
    when:
    - key: request.headers[authorization]
      values: ["Bearer *"]
  # Allow metrics access from monitoring namespace
  - from:
    - source:
        namespaces: ["edge-tpu-monitoring"]
    to:
    - operation:
        paths: ["/metrics"]
  # Deny all other access by default

---
# PeerAuthentication for mTLS
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: edge-tpu-mtls
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
spec:
  selector:
    matchLabels:
      app: edge-tpu-benchmark
  mtls:
    mode: STRICT

---
# RequestAuthentication for JWT
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: edge-tpu-jwt-auth
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
spec:
  selector:
    matchLabels:
      app: edge-tpu-benchmark
  jwtRules:
  - issuer: "https://auth.terragonlabs.ai"
    jwksUri: "https://auth.terragonlabs.ai/.well-known/jwks.json"
    audiences: ["edge-tpu-api"]
    forwardOriginalToken: true

---
# Telemetry Configuration for Enhanced Observability
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: edge-tpu-telemetry
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
spec:
  selector:
    matchLabels:
      app: edge-tpu-benchmark
  metrics:
  - providers:
    - name: prometheus
  - overrides:
    - match:
        metric: ALL_METRICS
      tagOverrides:
        request_protocol:
          value: "%{REQUEST_PROTOCOL}"
        response_code:
          value: "%{RESPONSE_CODE}"
        method:
          value: "%{REQUEST_METHOD}"
        url:
          value: "%{REQUEST_URL}"
  accessLogging:
  - providers:
    - name: otel
  tracing:
  - providers:
    - name: jaeger

---
# EnvoyFilter for Custom Headers
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: edge-tpu-custom-headers
  namespace: edge-tpu-production
  labels:
    app: edge-tpu-benchmark
spec:
  workloadSelector:
    labels:
      app: edge-tpu-benchmark
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_INBOUND
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.wasm
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.wasm.v3.Wasm
          config:
            root_id: add_header
            vm_config:
              vm_id: add_header
              runtime: envoy.wasm.runtime.v8
              code:
                local:
                  inline_string: |
                    class AddHeaderRoot extends RootContext {
                      onRequestHeaders() {
                        this.setRequestHeader("X-Edge-TPU-Version", "v6");
                        this.setRequestHeader("X-Request-ID", this.getRequestHeader("x-request-id"));
                        return FilterHeadersStatus.Continue;
                      }
                      onResponseHeaders() {
                        this.setResponseHeader("X-Edge-TPU-Processing-Time", this.getResponseHeader("x-envoy-upstream-service-time"));
                        return FilterHeadersStatus.Continue;
                      }
                    }

---
# Multi-Region Service Mesh Configuration
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: cross-region-gateway
  namespace: istio-system
  labels:
    component: multi-region
spec:
  selector:
    istio: eastwestgateway
  servers:
  - port:
      number: 15443
      name: tls
      protocol: TLS
    tls:
      mode: ISTIO_MUTUAL
    hosts:
    - "*.local"

---
# Cross-Region Virtual Service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: cross-region-edge-tpu
  namespace: edge-tpu-production
  labels:
    component: multi-region
spec:
  hosts:
  - edge-tpu-benchmark-active.edge-tpu-production.svc.cluster.local
  gateways:
  - cross-region-gateway
  http:
  - match:
    - headers:
        x-region:
          exact: us-west-2
    route:
    - destination:
        host: edge-tpu-benchmark-active.edge-tpu-production.svc.cluster.local
      weight: 100
    fault:
      abort:
        percentage:
          value: 0.1
        httpStatus: 503

---
# Traffic Splitting for A/B Testing
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: edge-tpu-ab-testing
  namespace: edge-tpu-staging
  labels:
    component: ab-testing
spec:
  hosts:
  - edge-tpu-benchmark-stable.edge-tpu-staging.svc.cluster.local
  http:
  - match:
    - headers:
        x-canary:
          exact: "true"
    route:
    - destination:
        host: edge-tpu-benchmark-canary.edge-tpu-staging.svc.cluster.local
      weight: 100
  - route:
    - destination:
        host: edge-tpu-benchmark-stable.edge-tpu-staging.svc.cluster.local
      weight: 90
    - destination:
        host: edge-tpu-benchmark-canary.edge-tpu-staging.svc.cluster.local
      weight: 10

---
# Circuit Breaker Configuration
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: edge-tpu-circuit-breaker
  namespace: edge-tpu-production
  labels:
    component: resilience
spec:
  host: edge-tpu-benchmark-active.edge-tpu-production.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 10
        maxRequestsPerConnection: 2
    outlierDetection:
      consecutiveGatewayErrors: 3
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50

---
# Rate Limiting Configuration
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: edge-tpu-rate-limit
  namespace: edge-tpu-production
  labels:
    component: rate-limiting
spec:
  workloadSelector:
    labels:
      app: edge-tpu-benchmark
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_INBOUND
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.local_ratelimit
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
          stat_prefix: edge_tpu_rate_limiter
          token_bucket:
            max_tokens: 100
            tokens_per_fill: 100
            fill_interval: 60s
          filter_enabled:
            runtime_key: edge_tpu_rate_limit_enabled
            default_value:
              numerator: 100
              denominator: HUNDRED
          filter_enforced:
            runtime_key: edge_tpu_rate_limit_enforced
            default_value:
              numerator: 100
              denominator: HUNDRED

---
# Istio Monitoring Configuration
apiVersion: v1
kind: Service
metadata:
  name: istio-proxy-metrics
  namespace: edge-tpu-production
  labels:
    app: istio-proxy
    component: metrics
spec:
  clusterIP: None
  ports:
  - name: http-monitoring
    port: 15090
    targetPort: 15090
  selector:
    app: edge-tpu-benchmark

---
# Service Monitor for Istio Metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: istio-proxy-metrics
  namespace: edge-tpu-production
  labels:
    team: edge-tpu
    component: istio-monitoring
spec:
  selector:
    matchLabels:
      app: istio-proxy
  namespaceSelector:
    matchNames:
    - edge-tpu-production
    - edge-tpu-staging
  endpoints:
  - port: http-monitoring
    interval: 15s
    path: /stats/prometheus

---
# Wasm Plugin for Custom Metrics
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: edge-tpu-custom-metrics
  namespace: edge-tpu-production
  labels:
    component: custom-metrics
spec:
  selector:
    matchLabels:
      app: edge-tpu-benchmark
  url: oci://registry.terragonlabs.ai/wasm/edge-tpu-metrics:v1.0.0
  pluginConfig:
    metric_name_prefix: "edge_tpu_"
    custom_metrics:
    - name: "inference_requests_total"
      type: "counter"
      description: "Total number of inference requests"
    - name: "inference_duration_seconds"
      type: "histogram"
      description: "Inference request duration"
      buckets: [0.001, 0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0]

---
# Istio ProxyConfig for Fine-tuning
apiVersion: networking.istio.io/v1beta1
kind: ProxyConfig
metadata:
  name: edge-tpu-proxy-config
  namespace: edge-tpu-production
  labels:
    component: proxy-tuning
spec:
  selector:
    matchLabels:
      app: edge-tpu-benchmark
  concurrency: 2
  environmentVariables:
    PILOT_ENABLE_WORKLOAD_ENTRY_AUTOREGISTRATION: "true"
    BOOTSTRAP_XDS_AGENT: "true"
  proxyStatsMatcher:
    inclusionRegexps:
    - ".*circuit_breakers.*"
    - ".*outlier_detection.*"
    - ".*_cx_.*"
    - ".*edge_tpu.*"