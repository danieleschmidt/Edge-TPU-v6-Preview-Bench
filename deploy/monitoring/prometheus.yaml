---
# Prometheus Operator Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-operator
  namespace: edge-tpu-monitoring
  labels:
    app: prometheus-operator
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-operator
  template:
    metadata:
      labels:
        app: prometheus-operator
    spec:
      serviceAccountName: prometheus-operator
      containers:
      - name: prometheus-operator
        image: quay.io/prometheus-operator/prometheus-operator:v0.68.0
        args:
        - --kubelet-service=kube-system/kubelet
        - --config-reloader-image=quay.io/prometheus-operator/prometheus-config-reloader:v0.68.0
        - --prometheus-instance-selector=app=prometheus
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

---
# Prometheus Instance
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prometheus-edge-tpu
  namespace: edge-tpu-monitoring
  labels:
    app: prometheus
    component: monitoring
spec:
  replicas: 2
  retention: 30d
  retentionSize: 50GiB
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 60Gi
  serviceAccountName: prometheus
  serviceMonitorSelector:
    matchLabels:
      team: edge-tpu
  ruleSelector:
    matchLabels:
      team: edge-tpu
  alerting:
    alertmanagers:
    - namespace: edge-tpu-monitoring
      name: alertmanager-edge-tpu
      port: web
  resources:
    requests:
      memory: 2Gi
      cpu: 1000m
    limits:
      memory: 4Gi
      cpu: 2000m
  securityContext:
    runAsUser: 1000
    runAsGroup: 3000
    runAsNonRoot: true
    fsGroup: 2000
  additionalScrapeConfigs:
    name: prometheus-additional-config
    key: prometheus-additional.yaml

---
# Prometheus Service
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: edge-tpu-monitoring
  labels:
    app: prometheus
spec:
  type: ClusterIP
  ports:
  - name: web
    port: 9090
    targetPort: 9090
  selector:
    app.kubernetes.io/name: prometheus

---
# ServiceMonitor for Edge TPU Benchmark
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: edge-tpu-benchmark-monitor
  namespace: edge-tpu-monitoring
  labels:
    team: edge-tpu
    app: edge-tpu-benchmark
spec:
  selector:
    matchLabels:
      app: edge-tpu-benchmark
  namespaceSelector:
    matchNames:
    - edge-tpu-production
    - edge-tpu-staging
  endpoints:
  - port: metrics
    interval: 15s
    path: /metrics
    honorLabels: true
    metricRelabelings:
    # Add environment label
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: environment
      regex: edge-tpu-(.+)
      replacement: ${1}
    # Add region label
    - sourceLabels: [__meta_kubernetes_pod_node_name]
      targetLabel: region
      regex: '.*-(.+)-.*'
      replacement: ${1}

---
# ServiceMonitor for Kubernetes Cluster Metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubernetes-cluster-monitor
  namespace: edge-tpu-monitoring
  labels:
    team: edge-tpu
    component: kubernetes
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  endpoints:
  - port: http-metrics
    interval: 30s

---
# ServiceMonitor for Node Exporter
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: node-exporter-monitor
  namespace: edge-tpu-monitoring
  labels:
    team: edge-tpu
    component: node-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-exporter
  endpoints:
  - port: metrics
    interval: 15s

---
# Additional Prometheus Configuration
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-additional-config
  namespace: edge-tpu-monitoring
type: Opaque
stringData:
  prometheus-additional.yaml: |
    - job_name: 'edge-tpu-custom-metrics'
      kubernetes_sd_configs:
      - role: endpoints
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_service_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_service_name]
        action: replace
        target_label: kubernetes_name
      
    - job_name: 'edge-tpu-inference-metrics'
      static_configs:
      - targets: ['edge-tpu-benchmark-active.edge-tpu-production.svc.cluster.local:9090']
        labels:
          environment: 'production'
          service: 'edge-tpu-benchmark'
      - targets: ['edge-tpu-benchmark-stable.edge-tpu-staging.svc.cluster.local:9090']
        labels:
          environment: 'staging'
          service: 'edge-tpu-benchmark'
      metrics_path: /metrics
      scrape_interval: 10s
      scrape_timeout: 5s
      
    - job_name: 'blackbox-exporter'
      metrics_path: /probe
      params:
        module: [http_2xx]
      static_configs:
      - targets:
        - http://edge-tpu-benchmark-active.edge-tpu-production.svc.cluster.local/health
        - http://edge-tpu-benchmark-active.edge-tpu-production.svc.cluster.local/ready
      relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter.edge-tpu-monitoring.svc.cluster.local:9115

---
# Prometheus Rules for Edge TPU Metrics
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: edge-tpu-rules
  namespace: edge-tpu-monitoring
  labels:
    team: edge-tpu
    app: prometheus-rules
spec:
  groups:
  - name: edge-tpu-performance.rules
    interval: 15s
    rules:
    # Recording rules for performance metrics
    - record: edge_tpu:inference_latency_p95_5m
      expr: histogram_quantile(0.95, sum(rate(edge_tpu_inference_duration_seconds_bucket[5m])) by (le, instance, environment))
      
    - record: edge_tpu:inference_latency_p99_5m
      expr: histogram_quantile(0.99, sum(rate(edge_tpu_inference_duration_seconds_bucket[5m])) by (le, instance, environment))
      
    - record: edge_tpu:throughput_rps_5m
      expr: sum(rate(edge_tpu_inferences_total[5m])) by (instance, environment)
      
    - record: edge_tpu:error_rate_5m
      expr: sum(rate(edge_tpu_inference_errors_total[5m])) by (instance, environment) / sum(rate(edge_tpu_inferences_total[5m])) by (instance, environment)
      
    - record: edge_tpu:accuracy_mean_5m
      expr: avg(edge_tpu_model_accuracy) by (instance, environment)
      
    - record: edge_tpu:power_efficiency_5m
      expr: avg(edge_tpu_power_efficiency_ratio) by (instance, environment)
      
    - record: edge_tpu:queue_depth_mean_5m
      expr: avg(edge_tpu_queue_depth) by (instance, environment)
      
    - record: edge_tpu:cpu_utilization_5m
      expr: avg(rate(container_cpu_usage_seconds_total{container="edge-tpu-benchmark"}[5m])) by (instance, environment)
      
    - record: edge_tpu:memory_utilization_5m
      expr: avg(container_memory_usage_bytes{container="edge-tpu-benchmark"}) by (instance, environment) / avg(container_spec_memory_limit_bytes{container="edge-tpu-benchmark"}) by (instance, environment)

  - name: edge-tpu-alerts.rules
    rules:
    # High latency alert
    - alert: EdgeTPUHighLatency
      expr: edge_tpu:inference_latency_p95_5m > 10
      for: 2m
      labels:
        severity: warning
        team: edge-tpu
        component: inference
      annotations:
        summary: "Edge TPU inference latency is high"
        description: "Edge TPU P95 inference latency is {{ $value }}ms for instance {{ $labels.instance }} in {{ $labels.environment }}"
        
    # Critical latency alert
    - alert: EdgeTPUCriticalLatency
      expr: edge_tpu:inference_latency_p95_5m > 20
      for: 1m
      labels:
        severity: critical
        team: edge-tpu
        component: inference
      annotations:
        summary: "Edge TPU inference latency is critically high"
        description: "Edge TPU P95 inference latency is {{ $value }}ms for instance {{ $labels.instance }} in {{ $labels.environment }}"
        
    # High error rate alert
    - alert: EdgeTPUHighErrorRate
      expr: edge_tpu:error_rate_5m > 0.05
      for: 2m
      labels:
        severity: warning
        team: edge-tpu
        component: inference
      annotations:
        summary: "Edge TPU error rate is high"
        description: "Edge TPU error rate is {{ $value | humanizePercentage }} for instance {{ $labels.instance }} in {{ $labels.environment }}"
        
    # Critical error rate alert
    - alert: EdgeTPUCriticalErrorRate
      expr: edge_tpu:error_rate_5m > 0.1
      for: 1m
      labels:
        severity: critical
        team: edge-tpu
        component: inference
      annotations:
        summary: "Edge TPU error rate is critically high"
        description: "Edge TPU error rate is {{ $value | humanizePercentage }} for instance {{ $labels.instance }} in {{ $labels.environment }}"
        
    # Low throughput alert
    - alert: EdgeTPULowThroughput
      expr: edge_tpu:throughput_rps_5m < 100
      for: 3m
      labels:
        severity: warning
        team: edge-tpu
        component: performance
      annotations:
        summary: "Edge TPU throughput is low"
        description: "Edge TPU throughput is {{ $value }} RPS for instance {{ $labels.instance }} in {{ $labels.environment }}"
        
    # Accuracy degradation alert
    - alert: EdgeTPUAccuracyDegradation
      expr: edge_tpu:accuracy_mean_5m < 0.95
      for: 5m
      labels:
        severity: warning
        team: edge-tpu
        component: model-quality
      annotations:
        summary: "Edge TPU model accuracy has degraded"
        description: "Edge TPU model accuracy is {{ $value | humanizePercentage }} for instance {{ $labels.instance }} in {{ $labels.environment }}"
        
    # Critical accuracy degradation
    - alert: EdgeTPUCriticalAccuracyDegradation
      expr: edge_tpu:accuracy_mean_5m < 0.90
      for: 2m
      labels:
        severity: critical
        team: edge-tpu
        component: model-quality
      annotations:
        summary: "Edge TPU model accuracy is critically low"
        description: "Edge TPU model accuracy is {{ $value | humanizePercentage }} for instance {{ $labels.instance }} in {{ $labels.environment }}"
        
    # High queue depth alert
    - alert: EdgeTPUHighQueueDepth
      expr: edge_tpu:queue_depth_mean_5m > 50
      for: 3m
      labels:
        severity: warning
        team: edge-tpu
        component: performance
      annotations:
        summary: "Edge TPU queue depth is high"
        description: "Edge TPU queue depth is {{ $value }} for instance {{ $labels.instance }} in {{ $labels.environment }}"
        
    # High CPU usage alert
    - alert: EdgeTPUHighCPUUsage
      expr: edge_tpu:cpu_utilization_5m > 0.8
      for: 5m
      labels:
        severity: warning
        team: edge-tpu
        component: resources
      annotations:
        summary: "Edge TPU CPU usage is high"
        description: "Edge TPU CPU usage is {{ $value | humanizePercentage }} for instance {{ $labels.instance }} in {{ $labels.environment }}"
        
    # High memory usage alert
    - alert: EdgeTPUHighMemoryUsage
      expr: edge_tpu:memory_utilization_5m > 0.85
      for: 5m
      labels:
        severity: warning
        team: edge-tpu
        component: resources
      annotations:
        summary: "Edge TPU memory usage is high"
        description: "Edge TPU memory usage is {{ $value | humanizePercentage }} for instance {{ $labels.instance }} in {{ $labels.environment }}"
        
    # Pod restart alert
    - alert: EdgeTPUPodRestarting
      expr: increase(kube_pod_container_status_restarts_total{container="edge-tpu-benchmark"}[1h]) > 3
      for: 5m
      labels:
        severity: warning
        team: edge-tpu
        component: stability
      annotations:
        summary: "Edge TPU pods are restarting frequently"
        description: "Edge TPU pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in the last hour"

    # Kubernetes resource alerts
    - alert: EdgeTPUPodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total{container="edge-tpu-benchmark"}[15m]) > 0
      for: 5m
      labels:
        severity: critical
        team: edge-tpu
        component: stability
      annotations:
        summary: "Edge TPU pod is crash looping"
        description: "Edge TPU pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is crash looping"
        
    - alert: EdgeTPUDeploymentReplicasMismatch
      expr: kube_deployment_spec_replicas{deployment=~"edge-tpu.*"} != kube_deployment_status_replicas_available{deployment=~"edge-tpu.*"}
      for: 10m
      labels:
        severity: warning
        team: edge-tpu
        component: deployment
      annotations:
        summary: "Edge TPU deployment has replica mismatch"
        description: "Edge TPU deployment {{ $labels.deployment }} has {{ $labels.spec_replicas }} desired replicas but only {{ $labels.available_replicas }} available"