---
# Alertmanager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: edge-tpu-monitoring
  labels:
    app: alertmanager
    component: monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      serviceAccountName: alertmanager
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.26.0
        args:
        - --config.file=/etc/alertmanager/alertmanager.yml
        - --storage.path=/var/lib/alertmanager
        - --data.retention=168h
        - --web.listen-address=0.0.0.0:9093
        - --web.external-url=https://alertmanager.edge-tpu.terragonlabs.ai
        - --cluster.listen-address=0.0.0.0:9094
        - --cluster.peer=alertmanager-0.alertmanager-headless.edge-tpu-monitoring.svc.cluster.local:9094
        - --cluster.peer=alertmanager-1.alertmanager-headless.edge-tpu-monitoring.svc.cluster.local:9094
        - --log.level=info
        ports:
        - containerPort: 9093
          name: web
          protocol: TCP
        - containerPort: 9094
          name: gossip
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
        - name: storage
          mountPath: /var/lib/alertmanager
        - name: templates
          mountPath: /etc/alertmanager/templates
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9093
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9093
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      volumes:
      - name: config
        configMap:
          name: alertmanager-config
      - name: storage
        persistentVolumeClaim:
          claimName: alertmanager-pvc
      - name: templates
        configMap:
          name: alertmanager-templates

---
# Alertmanager Service
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: edge-tpu-monitoring
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  ports:
  - port: 9093
    targetPort: 9093
    name: web
  - port: 9094
    targetPort: 9094
    name: gossip
  selector:
    app: alertmanager

---
# Alertmanager Headless Service for Clustering
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-headless
  namespace: edge-tpu-monitoring
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 9094
    targetPort: 9094
    name: gossip
  selector:
    app: alertmanager

---
# Alertmanager PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-pvc
  namespace: edge-tpu-monitoring
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: fast-ssd

---
# Alertmanager Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: edge-tpu-monitoring
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'alerts@terragonlabs.ai'
      smtp_auth_username: 'alerts@terragonlabs.ai'
      smtp_auth_password: 'smtp-app-password'
      smtp_require_tls: true
      slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
      pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
      
    templates:
    - '/etc/alertmanager/templates/*.tmpl'
    
    route:
      group_by: ['alertname', 'severity', 'team']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default'
      routes:
      # Critical alerts route
      - match:
          severity: critical
        receiver: 'critical-alerts'
        group_wait: 10s
        group_interval: 2m
        repeat_interval: 5m
        routes:
        # Edge TPU specific critical alerts
        - match:
            team: edge-tpu
          receiver: 'edge-tpu-critical'
          group_wait: 5s
          group_interval: 1m
          repeat_interval: 2m
        
      # Warning alerts route
      - match:
          severity: warning
        receiver: 'warning-alerts'
        group_wait: 1m
        group_interval: 10m
        repeat_interval: 4h
        routes:
        # Edge TPU specific warning alerts
        - match:
            team: edge-tpu
          receiver: 'edge-tpu-warnings'
          
      # Infrastructure alerts
      - match:
          component: kubernetes
        receiver: 'infrastructure-alerts'
        
      # Model quality alerts
      - match:
          component: model-quality
        receiver: 'ml-team-alerts'
        
    inhibit_rules:
    # Inhibit warning alerts when critical alerts are firing
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'instance']
      
    # Inhibit individual pod alerts when deployment is unhealthy
    - source_match:
        alertname: 'EdgeTPUDeploymentReplicasMismatch'
      target_match_re:
        alertname: 'EdgeTPU.*'
      equal: ['namespace']
        
    receivers:
    - name: 'default'
      email_configs:
      - to: 'devops@terragonlabs.ai'
        subject: '[Alertmanager] {{ .Status | title }}: {{ .CommonLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Instance: {{ .Labels.instance }}
          Environment: {{ .Labels.environment }}
          Severity: {{ .Labels.severity }}
          {{ end }}
    
    - name: 'critical-alerts'
      email_configs:
      - to: 'devops@terragonlabs.ai,oncall@terragonlabs.ai'
        subject: '[CRITICAL] {{ .CommonLabels.alertname }} - Immediate Action Required'
        body: |
          CRITICAL ALERT TRIGGERED
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Instance: {{ .Labels.instance }}
          Environment: {{ .Labels.environment }}
          Time: {{ .StartsAt }}
          {{ end }}
      slack_configs:
      - channel: '#alerts-critical'
        title: 'Critical Alert: {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Instance:* {{ .Labels.instance }}
          *Environment:* {{ .Labels.environment }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}
        send_resolved: true
      pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        description: '{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        severity: 'critical'
        
    - name: 'edge-tpu-critical'
      email_configs:
      - to: 'ml-team@terragonlabs.ai,devops@terragonlabs.ai,oncall@terragonlabs.ai'
        subject: '[CRITICAL] Edge TPU v6: {{ .CommonLabels.alertname }}'
        body: |
          CRITICAL EDGE TPU ALERT
          
          This alert indicates a severe issue with Edge TPU v6 benchmark performance
          that requires immediate attention.
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Instance: {{ .Labels.instance }}
          Environment: {{ .Labels.environment }}
          Component: {{ .Labels.component }}
          Time: {{ .StartsAt }}
          
          Runbook: https://docs.terragonlabs.ai/runbooks/edge-tpu/{{ .Labels.component }}
          {{ end }}
      slack_configs:
      - channel: '#edge-tpu-alerts'
        title: ':fire: Critical Edge TPU Alert'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Instance:* {{ .Labels.instance }}
          *Environment:* {{ .Labels.environment }}
          *Component:* {{ .Labels.component }}
          *Runbook:* https://docs.terragonlabs.ai/runbooks/edge-tpu/{{ .Labels.component }}
          {{ end }}
        send_resolved: true
      pagerduty_configs:
      - service_key: 'EDGE_TPU_PAGERDUTY_SERVICE_KEY'
        description: 'Edge TPU Critical: {{ .CommonLabels.alertname }}'
        severity: 'critical'
        
    - name: 'warning-alerts'
      email_configs:
      - to: 'devops@terragonlabs.ai'
        subject: '[WARNING] {{ .CommonLabels.alertname }}'
        body: |
          Warning alert triggered. Please investigate when convenient.
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Instance: {{ .Labels.instance }}
          Environment: {{ .Labels.environment }}
          {{ end }}
      slack_configs:
      - channel: '#alerts-warnings'
        title: 'Warning: {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          Instance: {{ .Labels.instance }} ({{ .Labels.environment }})
          {{ end }}
        
    - name: 'edge-tpu-warnings'
      email_configs:
      - to: 'ml-team@terragonlabs.ai'
        subject: '[WARNING] Edge TPU v6: {{ .CommonLabels.alertname }}'
        body: |
          Edge TPU performance warning detected.
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Instance: {{ .Labels.instance }}
          Environment: {{ .Labels.environment }}
          Component: {{ .Labels.component }}
          {{ end }}
      slack_configs:
      - channel: '#edge-tpu-alerts'
        title: ':warning: Edge TPU Warning'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Instance:* {{ .Labels.instance }} ({{ .Labels.environment }})
          *Component:* {{ .Labels.component }}
          {{ end }}
        
    - name: 'infrastructure-alerts'
      email_configs:
      - to: 'sre@terragonlabs.ai,devops@terragonlabs.ai'
        subject: '[INFRA] {{ .CommonLabels.alertname }}'
        body: |
          Infrastructure alert detected.
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Node: {{ .Labels.node }}
          Namespace: {{ .Labels.namespace }}
          {{ end }}
      slack_configs:
      - channel: '#infrastructure-alerts'
        title: 'Infrastructure Alert: {{ .CommonLabels.alertname }}'
        
    - name: 'ml-team-alerts'
      email_configs:
      - to: 'ml-team@terragonlabs.ai,data-science@terragonlabs.ai'
        subject: '[ML] Model Quality Alert: {{ .CommonLabels.alertname }}'
        body: |
          Model quality degradation detected in Edge TPU v6 benchmark.
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Model: {{ .Labels.model }}
          Environment: {{ .Labels.environment }}
          
          This may indicate:
          - Data drift in input samples
          - Model degradation over time  
          - Hardware calibration issues
          - Software regression
          
          Investigation steps:
          1. Check recent model deployments
          2. Validate input data quality
          3. Review hardware performance metrics
          4. Compare against baseline accuracy
          {{ end }}
      slack_configs:
      - channel: '#ml-team'
        title: ':chart_with_downwards_trend: Model Quality Alert'

---
# Alertmanager Templates
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-templates
  namespace: edge-tpu-monitoring
data:
  email.tmpl: |
    {{ define "edge-tpu.email.subject" }}
    [{{ .Status | toUpper }}] Edge TPU v6: {{ .GroupLabels.alertname }}
    {{ end }}
    
    {{ define "edge-tpu.email.html" }}
    <!DOCTYPE html>
    <html>
    <head>
      <style>
        body { font-family: Arial, sans-serif; }
        .alert { margin: 20px 0; padding: 15px; border-left: 5px solid; }
        .critical { border-color: #ff0000; background-color: #ffe6e6; }
        .warning { border-color: #ff9900; background-color: #fff3e0; }
        .resolved { border-color: #00aa00; background-color: #e8f5e8; }
        .metric { font-family: monospace; background-color: #f5f5f5; padding: 2px 4px; }
        .timestamp { color: #666; font-size: 0.9em; }
      </style>
    </head>
    <body>
      <h2>Edge TPU v6 Benchmark Alert</h2>
      
      {{ range .Alerts }}
      <div class="alert {{ .Labels.severity }}">
        <h3>{{ .Annotations.summary }}</h3>
        <p><strong>Description:</strong> {{ .Annotations.description }}</p>
        <p><strong>Instance:</strong> {{ .Labels.instance }}</p>
        <p><strong>Environment:</strong> {{ .Labels.environment }}</p>
        <p><strong>Component:</strong> {{ .Labels.component }}</p>
        <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
        <p class="timestamp"><strong>Started:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}</p>
        {{ if .Annotations.runbook_url }}
        <p><strong>Runbook:</strong> <a href="{{ .Annotations.runbook_url }}">{{ .Annotations.runbook_url }}</a></p>
        {{ end }}
      </div>
      {{ end }}
      
      <hr>
      <p><small>This alert was generated by the Edge TPU v6 Monitoring System</small></p>
    </body>
    </html>
    {{ end }}
    
  slack.tmpl: |
    {{ define "edge-tpu.slack.title" }}
    {{ if eq .Status "firing" }}
    :fire: Edge TPU Alert
    {{ else }}
    :white_check_mark: Edge TPU Alert Resolved
    {{ end }}
    {{ end }}
    
    {{ define "edge-tpu.slack.text" }}
    {{ range .Alerts }}
    *Alert:* {{ .Annotations.summary }}
    *Description:* {{ .Annotations.description }}
    *Instance:* {{ .Labels.instance }}
    *Environment:* {{ .Labels.environment }}
    *Component:* {{ .Labels.component }}
    *Severity:* {{ .Labels.severity }}
    {{ if .Annotations.runbook_url }}
    *Runbook:* {{ .Annotations.runbook_url }}
    {{ end }}
    {{ end }}
    {{ end }}

---
# Alertmanager ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  namespace: edge-tpu-monitoring

---
# Alertmanager Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager-ingress
  namespace: edge-tpu-monitoring
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: alertmanager-basic-auth
spec:
  tls:
  - hosts:
    - alertmanager.edge-tpu.terragonlabs.ai
    secretName: alertmanager-tls
  rules:
  - host: alertmanager.edge-tpu.terragonlabs.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: alertmanager
            port:
              number: 9093

---
# Basic Auth for Alertmanager
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-basic-auth
  namespace: edge-tpu-monitoring
type: Opaque
data:
  auth: YWRtaW46JGFwcjEkSDZsdzNsU1AkQzFsMi9YaWJpejlxNXlsWjd6TmtqLg==  # admin:admin123